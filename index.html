<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Logs de Avaliação</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f13;
      color: #ccc;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.2rem;
      color: #e8d5a3;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      max-width: 1200px;
    }

    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: #1a1a22;
      border: 1px solid #2e2e3a;
      border-radius: 8px;
      padding: 1.5rem;
    }

    .panel h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 0.3rem;
      margin-top: 1rem;
    }

    label:first-of-type { margin-top: 0; }

    input, textarea {
      width: 100%;
      background: #12121a;
      border: 1px solid #2e2e3a;
      border-radius: 5px;
      color: #ddd;
      font-size: 0.85rem;
      padding: 0.5rem 0.7rem;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #5a6ea0;
    }

    textarea { resize: vertical; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    button {
      margin-top: 1.2rem;
      width: 100%;
      padding: 0.6rem 1rem;
      background: #3a4e7a;
      color: #e8d5a3;
      border: none;
      border-radius: 5px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #4a60a0; }

    .output-area {
      position: relative;
    }

    .output-area textarea {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      line-height: 1.5;
      height: 420px;
      color: #a8c0a8;
    }

    .copy-btn {
      margin-top: 0.6rem;
      background: #2e3e2e;
      color: #8cba8c;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .copy-btn:hover { background: #3a4e3a; }

    .copied {
      background: #2e4e2e !important;
      color: #aaeaaa !important;
    }

    .count-badge {
      display: inline-block;
      background: #2e2e3a;
      color: #888;
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .dup-badge {
      background: #4e2e2e;
      color: #e07070;
    }

    .dup-warning {
      display: none;
      margin-top: 0.6rem;
      background: #1e1010;
      border: 1px solid #5a2a2a;
      border-radius: 5px;
      padding: 0.6rem 0.8rem;
      font-size: 0.75rem;
    }

    .dup-warning .dup-header {
      color: #e07070;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .dup-warning ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .dup-warning li {
      color: #c08080;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dup-warning li span {
      color: #666;
      margin-right: 0.3rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      border-bottom: 1px solid #2e2e3a;
    }

    .tab-btn {
      margin-top: 0;
      width: auto;
      background: none;
      color: #666;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s;
    }

    .tab-btn:hover { background: none; color: #aaa; }

    .tab-btn.active {
      color: #e8d5a3;
      border-bottom-color: #e8d5a3;
      background: none;
    }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    #avalCount, #attrCount {
      display: inline-block;
      background: #2e2e3a;
      color: #888;
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <h1>📖 Gerador de Log de Recompensa de Narração</h1>
  <div class="layout">
    <div class="panel">
      <h2>Dados do Log</h2>

      <div class="row">
        <div>
          <label>Nome do Personagem</label>
          <input type="text" id="charName" placeholder="João Gojo">
        </div>
        <div>
          <label>Data da Mudança</label>
          <input type="text" id="date" placeholder="04/03/2026">
        </div>
      </div>

      <label>Link do Personagem (ficha)</label>
      <input type="url" id="charLink" placeholder="https://goldenagejjkrpg.forumeiros.com/joao-gojo#666" autocomplete="url">

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('logs')">Logs</button>
        <button class="tab-btn" onclick="switchTab('avals')">Avaliações de RP</button>
        <button class="tab-btn" onclick="switchTab('attrs')">Avaliações de Atributo</button>
      </div>

      <div id="tab-logs" class="tab-pane active">
        <label>
          Links dos Logs
          <span class="count-badge" id="linkCount">0 links</span>
        </label>
        <textarea id="links" rows="8" placeholder="Cole os links aqui, um por linha:&#10;https://goldenagejjkrpg.forumeiros.com/t870-log-sayonara#1234&#10;https://goldenagejjkrpg.forumeiros.com/t314-log-kiyora-desgracada&#10;..."></textarea>
        <div id="dupWarning" class="dup-warning">
          <div class="dup-header">⚠ Links duplicados</div>
          <ul id="dupList"></ul>
        </div>
      </div>

      <div id="tab-avals" class="tab-pane">
        <label>
          Avaliações de RP
          <span id="avalCount">0 avaliações</span>
        </label>
        <textarea id="avalLinks" rows="8" placeholder="Cole as avaliações aqui, uma por linha:&#10;https://goldenagejjkrpg.forumeiros.com/t1097-treino-fonte-e-percepcao-magica-i#8620 (540)&#10;https://goldenagejjkrpg.forumeiros.com/t1152-quest-alter-kuma-b2#9320 (6000)&#10;..."></textarea>
        <div id="avalDupWarning" class="dup-warning">
          <div class="dup-header">⚠ Links duplicados</div>
          <ul id="avalDupList"></ul>
        </div>
      </div>

      <div id="tab-attrs" class="tab-pane">
        <div class="row">
          <div>
            <label>Contador anterior (0–9)</label>
            <input type="number" id="attrPrevCounter" min="0" max="9" value="0">
          </div>
          <div>
            <label>Link do contador anterior</label>
            <input type="url" id="attrPrevLink" placeholder="https://...">
          </div>
        </div>
        <label>
          Avaliações de Atributo
          <span id="attrCount">0 avaliações</span>
        </label>
        <textarea id="attrLinks" rows="6" placeholder="Cole as avaliações aqui, uma por linha:&#10;https://goldenagejjkrpg.forumeiros.com/t992-treino-francesa-ii#7564 (1)&#10;https://goldenagejjkrpg.forumeiros.com/t1083-treino-duplo-atributo-energia#8539 (2)&#10;..."></textarea>
        <div id="attrDupWarning" class="dup-warning">
          <div class="dup-header">⚠ Links duplicados</div>
          <ul id="attrDupList"></ul>
        </div>
      </div>

      <label>Texto da Nota (título | conteúdo)</label>
      <input type="text" id="noteTitle" placeholder="Título da Nota" value="Cálculo de XP">
      <textarea id="noteContent" rows="4"></textarea>

      <button onclick="generate()">Gerar HTML</button>
    </div>

    <div class="panel">
      <h2>HTML Gerado</h2>
      <div class="output-area">
        <textarea id="output" readonly placeholder="O HTML aparecerá aqui após clicar em Gerar HTML..."></textarea>
        <button class="copy-btn" id="copyBtn" onclick="copyOutput()">Copiar HTML</button>
      </div>
    </div>
  </div>

  <script>
    // Initialize date field with today's date and restore saved character data
    function initializeForm() {
      // Set date to today
      const today = new Date();
      const day = String(today.getDate()).padStart(2, '0');
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const year = today.getFullYear();
      const formattedDate = `${day}/${month}/${year}`;
      document.getElementById('date').value = formattedDate;

      // Restore character name and link from localStorage
      const savedCharName = localStorage.getItem('charName');
      const savedCharLink = localStorage.getItem('charLink');
      if (savedCharName) document.getElementById('charName').value = savedCharName;
      if (savedCharLink) document.getElementById('charLink').value = savedCharLink;
    }

    // Save character data to localStorage on input
    document.getElementById('charName').addEventListener('change', function() {
      localStorage.setItem('charName', this.value);
    });

    document.getElementById('charLink').addEventListener('change', function() {
      localStorage.setItem('charLink', this.value);
    });

    // Initialize form immediately (don't wait for DOMContentLoaded since script runs after DOM is loaded)
    initializeForm();

    const TAB_IDS = ['logs', 'avals', 'attrs'];

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', TAB_IDS[i] === tab);
      });
      TAB_IDS.forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      });
    }

    function recalcNote() {
      const logLines = document.getElementById('links').value.split('\n').map(l => l.trim()).filter(Boolean);
      const avals = parseAvaliacoes(document.getElementById('avalLinks').value);
      const attrs = parseAtributos(document.getElementById('attrLinks').value);
      const prevCounter = parseInt(document.getElementById('attrPrevCounter').value) || 0;
      updateNoteContent(logLines.length, avals, attrs, prevCounter);
    }

    // Update link count, flag duplicates, and auto-calc note on input
    document.getElementById('links').addEventListener('input', function () {
      const lines = this.value.split('\n').map(l => l.trim()).filter(Boolean);
      document.getElementById('linkCount').textContent = lines.length + ' link' + (lines.length !== 1 ? 's' : '');
      checkDuplicates(lines, 'linkCount', 'dupWarning', 'dupList');
      recalcNote();
    });

    document.getElementById('avalLinks').addEventListener('input', function () {
      const avals = parseAvaliacoes(this.value);
      document.getElementById('avalCount').textContent = avals.length + ' avaliaç' + (avals.length !== 1 ? 'ões' : 'ão');
      checkDuplicates(avals.map(a => a.url), 'avalCount', 'avalDupWarning', 'avalDupList');
      recalcNote();
    });

    document.getElementById('attrLinks').addEventListener('input', function () {
      const attrs = parseAtributos(this.value);
      document.getElementById('attrCount').textContent = attrs.length + ' avaliaç' + (attrs.length !== 1 ? 'ões' : 'ão');
      checkDuplicates(attrs.map(a => a.url), 'attrCount', 'attrDupWarning', 'attrDupList');
      recalcNote();
    });

    document.getElementById('attrPrevCounter').addEventListener('input', recalcNote);

    function parseAvaliacoes(text) {
      return text.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
        const match = line.match(/^(\S+)\s+\((\d+)\)\s*$/);
        if (!match) return null;
        return { url: match[1], xp: parseInt(match[2], 10) };
      }).filter(Boolean);
    }

    function parseAtributos(text) {
      return text.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
        const match = line.match(/^(\S+)\s+\((\d+)\)\s*$/);
        if (!match) return null;
        return { url: match[1], pts: parseInt(match[2], 10) };
      }).filter(Boolean);
    }

    function updateNoteContent(n, avals, attrs, prevCounter) {
      avals = avals || [];
      attrs = attrs || [];
      prevCounter = prevCounter || 0;

      const logXp = Math.trunc(n / 3) * 1000;
      const remainder = n % 3;
      const hasExtras = avals.length > 0 || attrs.length > 0;

      let lines = [];
      if (n > 0) {
        let logLine = `${n} Logs. 1000XP a cada 3 logs, ${logXp.toLocaleString('pt-BR')} XP Livre de logs.`;
        if (remainder > 0 && !hasExtras) logLine += `\nContador de logs em (${remainder}/3)`;
        lines.push(logLine);
      }

      let text = '';
      let totalXp = logXp;

      if (avals.length > 0) {
        const avalTotal = avals.reduce((sum, a) => sum + a.xp, 0);
        const avalXp = Math.trunc(avalTotal * 0.2);
        totalXp += avalXp;
        lines.push(`De avaliações de RP, 20% de ${avalTotal.toLocaleString('pt-BR')} = ${avalXp.toLocaleString('pt-BR')} XP Livre`);
      }

      if (attrs.length > 0) {
        const attrSum = attrs.reduce((sum, a) => sum + a.pts, 0);
        const combined = prevCounter + attrSum;
        const points = Math.trunc(combined / 10);
        const counter = combined % 10;
        const attrXp = attrSum * 1000;
        totalXp += attrXp;
        let attrLine = `${attrSum} treinos de atributo. ${attrXp.toLocaleString('pt-BR')} de XP`;
        if (points > 0) attrLine += ` e ${points} Ponto${points !== 1 ? 's' : ''} de Atributo Livre`;
        attrLine += `. Contador em ${counter}/10.`;
        lines.push(attrLine);
      }

      if (hasExtras) {
        lines.push('');
        lines.push(`Total de XP Livre OFF de Avaliações e Logs = ${totalXp.toLocaleString('pt-BR')} XP`);
      }

      document.getElementById('noteContent').value = lines.join('\n');
    }

    function checkDuplicates(urls, badgeId, warningId, listId) {
      const seen = {};
      urls.forEach((url, i) => {
        if (!seen[url]) seen[url] = [];
        seen[url].push(i + 1);
      });

      const dups = Object.entries(seen).filter(([, idxs]) => idxs.length > 1);
      const warning = document.getElementById(warningId);
      const badge = document.getElementById(badgeId);

      if (dups.length === 0) {
        warning.style.display = 'none';
        badge.classList.remove('dup-badge');
        return;
      }

      badge.classList.add('dup-badge');
      warning.style.display = 'block';

      const list = document.getElementById(listId);
      list.innerHTML = dups.map(([url, idxs]) =>
        `<li><span>linhas ${idxs.join(', ')}:</span>${url}</li>`
      ).join('');
    }

    function nameFromUrl(url) {
      // Extract slug from pattern: /tN(pN)?-log[-]{slug}#postid
      // Also handles missing space/dash: -logName-Surname
      const match = url.match(/\/[^/]*-log-?([^#?]+)/);
      if (!match) return '';
      return match[1]
        .split('-')
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function generate() {
      const charName = document.getElementById('charName').value.trim();
      const charLink = document.getElementById('charLink').value.trim();
      const date = document.getElementById('date').value.trim();
      const noteTitle = document.getElementById('noteTitle').value.trim();
      const noteContent = document.getElementById('noteContent').value.trim();
      const rawLinks = document.getElementById('links').value
        .split('\n')
        .map(l => l.trim())
        .filter(Boolean);

      const rawAvals = parseAvaliacoes(document.getElementById('avalLinks').value);
      const rawAttrs = parseAtributos(document.getElementById('attrLinks').value);
      const attrPrevCounter = parseInt(document.getElementById('attrPrevCounter').value) || 0;
      const attrPrevLink = document.getElementById('attrPrevLink').value.trim();

      if (!rawLinks.length && !rawAvals.length && !rawAttrs.length) {
        alert('Cole pelo menos um link.');
        return;
      }

      let items = '';

      // Character
      if (charName || charLink) {
        const nameHtml = charName ? `<a href="${escapeHtml(charLink)}" target="_blank">${escapeHtml(charName)}</a>` : escapeHtml(charLink);
        items += `<li><span class="label">Personagem:</span><span class="value">${nameHtml}</span></li>`;
      }

      // Date
      if (date) {
        items += `<li><span class="label">Data da Mudança:</span><span class="value">${escapeHtml(date)}</span></li>`;
      }

      // Log links
      rawLinks.forEach((url, i) => {
        const name = nameFromUrl(url);
        const label = i === 0 ? 'Fonte da Mudança' : 'Extra';
        const text = ` [Log] ${name} [${i + 1}]`;
        items += `<li><span class="label">${label}:</span><span class="value"><a href="${escapeHtml(url)}" target="_blank">${escapeHtml(text)}</a></span></li>`;
      });

      // Avaliação de RP links
      rawAvals.forEach(({ url, xp }) => {
        const text = `Avaliação de RP (${xp.toLocaleString('pt-BR')} XP)`;
        items += `<li><span class="label">Extra:</span><span class="value"><a href="${escapeHtml(url)}" target="_blank">${escapeHtml(text)}</a></span></li>`;
      });

      // Avaliação de Atributo links
      if (rawAttrs.length > 0) {
        if (attrPrevLink) {
          const prevText = `Avaliações de treino de atributo anteriores: (${attrPrevCounter}/10)`;
          items += `<li><span class="label">Extra:</span><span class="value"><a href="${escapeHtml(attrPrevLink)}" target="_blank">${escapeHtml(prevText)}</a></span></li>`;
        }
        rawAttrs.forEach(({ url, pts }) => {
          const text = `Avaliação de treino atributo (${pts})`;
          items += `<li><span class="label">Extra:</span><span class="value"><a href="${escapeHtml(url)}" target="_blank">${escapeHtml(text)}</a></span></li>`;
        });
      }

      // Notes block
      let notesBlock = '';
      if (noteTitle || noteContent) {
        const contentLines = noteContent
          .split('\n')
          .map(l => escapeHtml(l))
          .join('<br>');
        notesBlock = `<div class="log-text-block add"><div class="log-text-title">${escapeHtml(noteTitle)} <span class="log-status-tag">[+ ADICIONADO]</span></div><div class="log-text-content"><p>${contentLines}</p></div></div>`;
      }

      const html =
        `<link href="https://gaaaaaaaaabs.github.io/goldenagerepositor.io/log-ficha.css" rel="stylesheet" type="text/css">` +
        `<div class="log-container">` +
          `<div class="log-header">` +
            `<div class="log-icon">📖</div>` +
            `<h2 class="log-title">Registro de Modificação</h2>` +
          `</div>` +
          `<div class="log-body">` +
            `<ul class="log-details">${items}</ul>` +
            notesBlock +
          `</div>` +
        `</div>`;

      document.getElementById('output').value = html;
    }

    function copyOutput() {
      const output = document.getElementById('output');
      if (!output.value) return;
      navigator.clipboard.writeText(output.value).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copiado!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copiar HTML';
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
